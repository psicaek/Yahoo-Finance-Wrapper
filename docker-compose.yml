services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - appnet

  yfinance-wrapper:
    build: ./yfinance-wrapper
    container_name: yfinance-wrapper
    ports:
      - "7000:7000"
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:

volumes:
  n8n_data:
